spring:
  cloud:
    azure:
      keyvault:
        secret:
          property-sources:
            - enabled: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${MOCK_OAUTH2_SERVER_URI:http://localhost:8090}/default
          audiences: mock-api-client-id
  ai:
    openai-sdk:
      api-key: ${OPENAI_API_KEY}
      base-url: ${OPENAI_BASE_URL}
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      base-url: ${ANTHROPIC_BASE_URL}
    google:
      genai:
        api-key: ${GOOGLE_AI_API_KEY}
        base-url: ${GOOGLE_AI_BASE_URL}
    elevenlabs:
      base-url: ${ELEVEN_LABS_BASE_URL}
      api-key: ${ELEVEN_LABS_API_KEY}
