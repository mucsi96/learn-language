storage:
  directory: ${STORAGE_DIRECTORY}
spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: ${db-url}
    username: ${db-username}
    password: ${db-password}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-init-sql: CREATE SCHEMA IF NOT EXISTS learn_language
  jpa:
    properties:
      hibernate:
        show-sql: true
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    default-schema: learn_language
    liquibase-schema: learn_language
  cloud:
    azure:
      keyvault:
        secret:
          property-sources:
            - endpoint: ${AZURE_KEYVAULT_ENDPOINT}
              enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://login.microsoftonline.com/${tenant-id:}/v2.0
          audiences: ${api-client-id:}
  ai:
    openai-sdk:
      api-key: ${openai-api-key}
    anthropic:
      api-key: ${claude-api-key}
    google:
      genai:
        api-key: ${google-ai-api-key}
    elevenlabs:
      api-key: ${eleven-labs-api-key}
      tts:
        options:
          output-format: mp3_44100_128
server:
  servlet:
    context-path: /api
management:
  server:
    port: ${SPRING_ACTUATOR_PORT}
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,db
