apiVersion: v1
kind: Pod
metadata:
  name: traefik
spec:
  containers:
    - name: traefik
      image: docker.io/library/traefik:v3.6
      ports:
        - containerPort: 80
          hostPort: 8180
        - containerPort: 8080
          hostPort: 8181
      volumeMounts:
        - name: traefik-config
          mountPath: /etc/traefik/traefik.yaml
          readOnly: true
        - name: podman-sock
          mountPath: /var/run/docker.sock
          readOnly: true
  volumes:
    - name: traefik-config
      hostPath:
        path: {{PROJECT_DIR}}/test/traefik.yaml
        type: File
    - name: podman-sock
      hostPath:
        path: {{PODMAN_SOCK}}
        type: Socket
---
apiVersion: v1
kind: Pod
metadata:
  name: db
spec:
  containers:
    - name: db
      image: docker.io/library/postgres:17.5-bullseye
      ports:
        - containerPort: 5432
          hostPort: 5460
      env:
        - name: POSTGRES_DB
          value: test
        - name: POSTGRES_PASSWORD
          value: postgres
        - name: POSTGRES_USER
          value: postgres
---
apiVersion: v1
kind: Pod
metadata:
  name: mock-openai
spec:
  containers:
    - name: mock-openai
      image: localhost/learn-language-mock-openai:test
      env:
        - name: PORT
          value: "3000"
---
apiVersion: v1
kind: Pod
metadata:
  name: mock-google-ai
spec:
  containers:
    - name: mock-google-ai
      image: localhost/learn-language-mock-google-ai:test
      env:
        - name: PORT
          value: "3001"
---
apiVersion: v1
kind: Pod
metadata:
  name: mock-anthropic
spec:
  containers:
    - name: mock-anthropic
      image: localhost/learn-language-mock-anthropic:test
      env:
        - name: PORT
          value: "3003"
---
apiVersion: v1
kind: Pod
metadata:
  name: mock-elevenlabs
spec:
  containers:
    - name: mock-elevenlabs
      image: localhost/learn-language-mock-elevenlabs:test
      env:
        - name: PORT
          value: "3002"
---
apiVersion: v1
kind: Pod
metadata:
  name: server
  annotations:
    traefik.enable: "true"
    traefik.http.routers.server.rule: "PathPrefix(`/api`)"
    traefik.http.routers.server.priority: "2"
    traefik.http.services.server.loadbalancer.server.port: "8080"
spec:
  containers:
    - name: server
      image: localhost/learn-language-server:test
      securityContext:
        runAsUser: {{USER_ID}}
        runAsGroup: {{GROUP_ID}}
      env:
        - name: SPRING_ACTUATOR_PORT
          value: "8182"
        - name: SPRING_PROFILES_ACTIVE
          value: test
        - name: DB_URL
          value: jdbc:postgresql://db:5432/test
        - name: DB_USERNAME
          value: postgres
        - name: DB_PASSWORD
          value: postgres
        - name: STORAGE_DIRECTORY
          value: /app/storage
        - name: OPENAI_API_KEY
          value: mock-key
        - name: OPENAI_BASE_URL
          value: http://mock-openai:3000
        - name: ANTHROPIC_API_KEY
          value: mock-anthropic-key
        - name: ANTHROPIC_BASE_URL
          value: http://mock-anthropic:3003
        - name: GOOGLE_AI_API_KEY
          value: mock-google-key
        - name: GOOGLE_AI_BASE_URL
          value: http://mock-google-ai:3001
        - name: ELEVEN_LABS_API_KEY
          value: mock-elevenlabs-key
        - name: ELEVEN_LABS_BASE_URL
          value: http://mock-elevenlabs:3002
      volumeMounts:
        - name: storage
          mountPath: /app/storage
  volumes:
    - name: storage
      hostPath:
        path: {{PROJECT_DIR}}/test/storage
        type: Directory
---
apiVersion: v1
kind: Pod
metadata:
  name: client
  annotations:
    traefik.enable: "true"
    traefik.http.routers.client.rule: "PathPrefix(`/`)"
    traefik.http.routers.client.priority: "1"
    traefik.http.services.client.loadbalancer.server.port: "80"
spec:
  containers:
    - name: client
      image: localhost/learn-language-client:test
