apiVersion: v1
kind: Pod
metadata:
  name: learn-language-test
spec:
  containers:
    - name: traefik
      image: docker.io/library/traefik:v3.6
      ports:
        - containerPort: 80
          hostPort: 8180
        - containerPort: 8081
          hostPort: 8181
      volumeMounts:
        - name: traefik-config
          mountPath: /etc/traefik/traefik.yaml
          readOnly: true
        - name: traefik-routes
          mountPath: /etc/traefik/routes.yaml
          readOnly: true

    - name: db
      image: docker.io/library/postgres:17.5-bullseye
      ports:
        - containerPort: 5432
          hostPort: 5460
      env:
        - name: POSTGRES_DB
          value: test
        - name: POSTGRES_PASSWORD
          value: postgres
        - name: POSTGRES_USER
          value: postgres

    - name: mock-openai
      image: localhost/learn-language-mock-openai:test
      env:
        - name: PORT
          value: "3000"

    - name: mock-google-ai
      image: localhost/learn-language-mock-google-ai:test
      env:
        - name: PORT
          value: "3001"

    - name: mock-anthropic
      image: localhost/learn-language-mock-anthropic:test
      env:
        - name: PORT
          value: "3003"

    - name: mock-elevenlabs
      image: localhost/learn-language-mock-elevenlabs:test
      env:
        - name: PORT
          value: "3002"

    - name: server
      image: localhost/learn-language-server:test
      securityContext:
        runAsUser: {{USER_ID}}
        runAsGroup: {{GROUP_ID}}
      env:
        - name: SPRING_ACTUATOR_PORT
          value: "8182"
        - name: SPRING_PROFILES_ACTIVE
          value: test
        - name: DB_URL
          value: jdbc:postgresql://localhost:5432/test
        - name: DB_USERNAME
          value: postgres
        - name: DB_PASSWORD
          value: postgres
        - name: STORAGE_DIRECTORY
          value: /app/storage
        - name: OPENAI_API_KEY
          value: mock-key
        - name: OPENAI_BASE_URL
          value: http://localhost:3000
        - name: ANTHROPIC_API_KEY
          value: mock-anthropic-key
        - name: ANTHROPIC_BASE_URL
          value: http://localhost:3003
        - name: GOOGLE_AI_API_KEY
          value: mock-google-key
        - name: GOOGLE_AI_BASE_URL
          value: http://localhost:3001
        - name: ELEVEN_LABS_API_KEY
          value: mock-elevenlabs-key
        - name: ELEVEN_LABS_BASE_URL
          value: http://localhost:3002
      volumeMounts:
        - name: storage
          mountPath: /app/storage

    - name: client
      image: localhost/learn-language-client:test
      volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          readOnly: true

  volumes:
    - name: traefik-config
      hostPath:
        path: {{PROJECT_DIR}}/test/traefik.yaml
        type: File
    - name: traefik-routes
      hostPath:
        path: {{PROJECT_DIR}}/test/traefik-routes.yaml
        type: File
    - name: storage
      hostPath:
        path: {{PROJECT_DIR}}/test/storage
        type: Directory
    - name: nginx-config
      hostPath:
        path: {{PROJECT_DIR}}/test/nginx-pod.conf
        type: File
