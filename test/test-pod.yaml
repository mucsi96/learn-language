apiVersion: v1
kind: Pod
metadata:
  name: learn-language-test
spec:
  containers:
    - name: traefik
      image: docker.io/library/traefik:v3.6
      ports:
        - containerPort: 80
          hostPort: 8170
        - containerPort: 8081
          hostPort: 8171
      volumeMounts:
        - name: traefik-config
          mountPath: /etc/traefik/traefik.yaml
          readOnly: true
        - name: traefik-routes
          mountPath: /etc/traefik/routes.yaml
          readOnly: true
      livenessProbe:
        exec:
          command: ["traefik", "healthcheck", "--ping"]
        initialDelaySeconds: 2
        periodSeconds: 2
        failureThreshold: 5

    - name: db
      image: docker.io/library/postgres:17.5-bullseye
      ports:
        - containerPort: 5432
          hostPort: 5470
      env:
        - name: POSTGRES_DB
          value: test
        - name: POSTGRES_PASSWORD
          value: postgres
        - name: POSTGRES_USER
          value: postgres
      livenessProbe:
        exec:
          command: ["pg_isready", "-U", "postgres"]
        initialDelaySeconds: 5
        periodSeconds: 10
        failureThreshold: 5

    - name: mock-openai
      image: localhost/learn-language-mock-openai:test
      ports:
        - containerPort: 3070
          hostPort: 3070
      env:
        - name: PORT
          value: "3070"
      livenessProbe:
        httpGet:
          path: /health
          port: 3070
        initialDelaySeconds: 2
        periodSeconds: 2
        failureThreshold: 5

    - name: mock-google-ai
      image: localhost/learn-language-mock-google-ai:test
      ports:
        - containerPort: 3071
          hostPort: 3071
      env:
        - name: PORT
          value: "3071"
      livenessProbe:
        httpGet:
          path: /health
          port: 3071
        initialDelaySeconds: 2
        periodSeconds: 2
        failureThreshold: 5

    - name: mock-elevenlabs
      image: localhost/learn-language-mock-elevenlabs:test
      ports:
        - containerPort: 3072
          hostPort: 3072
      env:
        - name: PORT
          value: "3072"
      livenessProbe:
        httpGet:
          path: /health
          port: 3072
        initialDelaySeconds: 2
        periodSeconds: 2
        failureThreshold: 5

    - name: mock-anthropic
      image: localhost/learn-language-mock-anthropic:test
      ports:
        - containerPort: 3073
          hostPort: 3073
      env:
        - name: PORT
          value: "3073"
      livenessProbe:
        httpGet:
          path: /health
          port: 3073
        initialDelaySeconds: 2
        periodSeconds: 2
        failureThreshold: 5

    - name: mock-oauth2
      image: docker.io/mucsi96/mock-oidc-provider:latest
      ports:
        - containerPort: 8079
          hostPort: 8079
      env:
        - name: PORT
          value: "8079"
        - name: ISSUER_ID
          value: default
        - name: SUB
          value: test-user
        - name: NAME
          value: Test User
        - name: PREFERRED_USERNAME
          value: test-user@example.com
        - name: ROLES
          value: DeckReader,DeckCreator
        - name: SCP
          value: readDecks createDeck
        - name: AUD
          value: mock-api-client-id
      livenessProbe:
        httpGet:
          path: /health
          port: 8079
        initialDelaySeconds: 2
        periodSeconds: 2
        failureThreshold: 5

    - name: server
      image: localhost/learn-language-server:test
      env:
        - name: SPRING_ACTUATOR_PORT
          value: "8172"
        - name: SPRING_PROFILES_ACTIVE
          value: test
        - name: DB_URL
          value: jdbc:postgresql://localhost:5432/test
        - name: DB_USERNAME
          value: postgres
        - name: DB_PASSWORD
          value: postgres
        - name: MOCK_OAUTH2_SERVER_URI
          value: http://localhost:8079
        - name: STORAGE_DIRECTORY
          value: /app/storage
        - name: OPENAI_API_KEY
          value: mock-key
        - name: OPENAI_BASE_URL
          value: http://localhost:3070
        - name: ANTHROPIC_API_KEY
          value: mock-anthropic-key
        - name: ANTHROPIC_BASE_URL
          value: http://localhost:3073
        - name: GOOGLE_AI_API_KEY
          value: mock-google-key
        - name: GOOGLE_AI_BASE_URL
          value: http://localhost:3071
        - name: ELEVEN_LABS_API_KEY
          value: mock-elevenlabs-key
        - name: ELEVEN_LABS_BASE_URL
          value: http://localhost:3072
      volumeMounts:
        - name: storage
          mountPath: /app/storage
      startupProbe:
        httpGet:
          path: /actuator/health/readiness
          port: 8172
        periodSeconds: 2
        failureThreshold: 30
      livenessProbe:
        httpGet:
          path: /actuator/health/liveness
          port: 8172
        periodSeconds: 2
        failureThreshold: 5

    - name: client
      image: localhost/learn-language-client:test
      livenessProbe:
        httpGet:
          path: /
          port: 8000
        initialDelaySeconds: 5
        periodSeconds: 2
        failureThreshold: 10

  volumes:
    - name: traefik-config
      hostPath:
        path: test/traefik.yaml
        type: File
    - name: traefik-routes
      hostPath:
        path: test/traefik-routes.yaml
        type: File
    - name: storage
      hostPath:
        path: test/storage
        type: DirectoryOrCreate
