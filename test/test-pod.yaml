apiVersion: v1
kind: Pod
metadata:
  name: learn-language-test
spec:
  containers:
    - name: traefik
      image: docker.io/library/traefik:v3.6
      ports:
        - containerPort: 80
          hostPort: 8180
        - containerPort: 8081
          hostPort: 8181
      volumeMounts:
        - name: traefik-config
          mountPath: /etc/traefik/traefik.yaml
          readOnly: true
        - name: traefik-routes
          mountPath: /etc/traefik/routes.yaml
          readOnly: true
      livenessProbe:
        exec:
          command: ["traefik", "healthcheck", "--ping"]
        initialDelaySeconds: 2
        periodSeconds: 2
        failureThreshold: 5

    - name: db
      image: docker.io/library/postgres:17.5-bullseye
      ports:
        - containerPort: 5432
          hostPort: 5460
      env:
        - name: POSTGRES_DB
          value: test
        - name: POSTGRES_PASSWORD
          value: postgres
        - name: POSTGRES_USER
          value: postgres
      livenessProbe:
        exec:
          command: ["pg_isready", "-U", "postgres"]
        initialDelaySeconds: 5
        periodSeconds: 10
        failureThreshold: 5

    - name: mock-openai
      image: localhost/learn-language-mock-openai:test
      ports:
        - containerPort: 3000
          hostPort: 3000
      env:
        - name: PORT
          value: "3000"
      livenessProbe:
        httpGet:
          path: /health
          port: 3000
        initialDelaySeconds: 2
        periodSeconds: 2
        failureThreshold: 5

    - name: mock-google-ai
      image: localhost/learn-language-mock-google-ai:test
      ports:
        - containerPort: 3001
          hostPort: 3001
      env:
        - name: PORT
          value: "3001"
      livenessProbe:
        httpGet:
          path: /health
          port: 3001
        initialDelaySeconds: 2
        periodSeconds: 2
        failureThreshold: 5

    - name: mock-anthropic
      image: localhost/learn-language-mock-anthropic:test
      ports:
        - containerPort: 3003
          hostPort: 3003
      env:
        - name: PORT
          value: "3003"
      livenessProbe:
        httpGet:
          path: /health
          port: 3003
        initialDelaySeconds: 2
        periodSeconds: 2
        failureThreshold: 5

    - name: mock-elevenlabs
      image: localhost/learn-language-mock-elevenlabs:test
      ports:
        - containerPort: 3002
          hostPort: 3002
      env:
        - name: PORT
          value: "3002"
      livenessProbe:
        httpGet:
          path: /health
          port: 3002
        initialDelaySeconds: 2
        periodSeconds: 2
        failureThreshold: 5

    - name: server
      image: localhost/learn-language-server:test
      env:
        - name: SPRING_ACTUATOR_PORT
          value: "8182"
        - name: SPRING_PROFILES_ACTIVE
          value: test
        - name: DB_URL
          value: jdbc:postgresql://localhost:5432/test
        - name: DB_USERNAME
          value: postgres
        - name: DB_PASSWORD
          value: postgres
        - name: STORAGE_DIRECTORY
          value: /app/storage
        - name: OPENAI_API_KEY
          value: mock-key
        - name: OPENAI_BASE_URL
          value: http://localhost:3000
        - name: ANTHROPIC_API_KEY
          value: mock-anthropic-key
        - name: ANTHROPIC_BASE_URL
          value: http://localhost:3003
        - name: GOOGLE_AI_API_KEY
          value: mock-google-key
        - name: GOOGLE_AI_BASE_URL
          value: http://localhost:3001
        - name: ELEVEN_LABS_API_KEY
          value: mock-elevenlabs-key
        - name: ELEVEN_LABS_BASE_URL
          value: http://localhost:3002
      volumeMounts:
        - name: storage
          mountPath: /app/storage
      livenessProbe:
        httpGet:
          path: /actuator/health/readiness
          port: 8182
        initialDelaySeconds: 16
        periodSeconds: 2
        failureThreshold: 10

    - name: client
      image: localhost/learn-language-client:test
      volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          readOnly: true
      livenessProbe:
        httpGet:
          path: /
          port: 8000
        initialDelaySeconds: 5
        periodSeconds: 2
        failureThreshold: 10

  volumes:
    - name: traefik-config
      hostPath:
        path: test/traefik.yaml
        type: File
    - name: traefik-routes
      hostPath:
        path: test/traefik-routes.yaml
        type: File
    - name: storage
      hostPath:
        path: test/storage
        type: Directory
    - name: nginx-config
      hostPath:
        path: test/nginx-pod.conf
        type: File
