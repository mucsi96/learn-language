<h2 mat-dialog-title>{{ title }}</h2>

<mat-dialog-content>
  <div class="messages" role="log" aria-label="Conversation">
    @for (msg of messages(); track $index) {
      <div
        class="bubble"
        [class.user]="msg.role === 'user'"
        [class.assistant]="msg.role === 'assistant'">
        @if (msg.role === 'assistant') {
          @for (segment of segments(msg.content); track $index) {
            @if (segment.german) {
              <span class="german">{{ segment.text }}</span>
            } @else {
              <span>{{ segment.text }}</span>
            }
          }
        } @else {
          {{ msg.content }}
        }
      </div>
    }
    @if (isBusy()) {
      <div class="bubble assistant loading">
        <mat-spinner diameter="20" aria-label="Generating answer"></mat-spinner>
      </div>
    }
  </div>
</mat-dialog-content>

<mat-dialog-actions class="composer">
  <mat-form-field appearance="outline" class="question-field" subscriptSizing="dynamic">
    <input
      matInput
      [ngModel]="draft()"
      (ngModelChange)="draft.set($event)"
      (keyup.enter)="submitText()"
      [disabled]="isBusy()"
      placeholder="Kérdezz valamit a kártyáról..."
      aria-label="Ask a question" />
  </mat-form-field>
  <button
    mat-icon-button
    [attr.aria-label]="isRecording() ? 'Stop recording' : 'Speak'"
    [disabled]="isSending() || isTranscribing()"
    (click)="toggleRecording()">
    <mat-icon>{{ isRecording() ? 'stop' : 'mic' }}</mat-icon>
  </button>
  <button
    mat-icon-button
    aria-label="Send"
    [disabled]="isBusy() || draft().trim().length === 0"
    (click)="submitText()">
    <mat-icon>send</mat-icon>
  </button>
</mat-dialog-actions>
