<div class="card-actions">
  <button
    mat-icon-button
    class="menu-trigger"
    [matMenuTriggerFor]="actionsMenu"
    (click)="$event.stopPropagation()"
    aria-label="Card actions">
    <mat-icon>more_vert</mat-icon>
  </button>

  <mat-menu #actionsMenu="matMenu">
    @if (sourceId()) {
      <button mat-menu-item (click)="skipCard()">
        <mat-icon>skip_next</mat-icon>
        <span>Skip Card</span>
      </button>
    }
    <button mat-menu-item (click)="openVoiceSelection()">
      <mat-icon>record_voice_over</mat-icon>
      <span>Voice Selection</span>
    </button>
    <button mat-menu-item (click)="toggleFlag()">
      <mat-icon>{{ isFlagged() ? 'flag' : 'outlined_flag' }}</mat-icon>
      <span>{{ isFlagged() ? 'Remove Flag' : 'Flag Card' }}</span>
    </button>
    <a
      mat-menu-item
      [routerLink]="['/sources', card()?.value()?.source?.id, 'page', card()?.value()?.sourcePageNumber, 'cards', card()?.value()?.id]">
      <mat-icon>edit</mat-icon>
      <span>Edit Card</span>
    </a>
  </mat-menu>
</div>
