@if (model()) {
  <span class="model-name">
    {{ model() }}
    <span
      class="generation-method"
      [class.has-tooltip]="description()"
      [matTooltip]="description() ?? ''"
      [matTooltipDisabled]="!description()"
      >{{ description() ? "described" : "direct" }}</span
    >
  </span>
}
