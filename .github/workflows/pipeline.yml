name: Pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-e2e:
    concurrency:
      group: test-e2e-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: test/package-lock.json
      - name: Install dependencies
        working-directory: test
        run: npm ci
      - name: Install Playwright browsers
        working-directory: test
        run: npx playwright install chromium --with-deps
      - name: Setup test environment and start pod
        run: scripts/pod_up.sh
      - name: Run Playwright tests
        working-directory: test
        run: npx playwright test --shard=${{ matrix.shard }}/5
      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results-shard-${{ matrix.shard }}
          path: test/test-results
      - name: Collect pod logs
        if: always()
        run: |
          for container in $(podman pod inspect learn-language-test --format '{{range .Containers}}{{.Name}} {{end}}' 2>/dev/null); do
            echo "$container" | grep -q "infra" && continue
            echo "=== $container ==="
            podman logs "$container" 2>&1 || true
          done

  publish-server:
    concurrency:
      group: publish-server-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    needs: test-e2e
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Get next version
        id: get_next_version
        uses: mucsi96/get-next-version@main
        with:
          prefix: 'server'
          src: server
      - name: Login to Docker Hub
        if: steps.get_next_version.outputs.hasNextVersion == 'true'
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | podman login --username "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin docker.io
      - name: Build and push server image
        if: steps.get_next_version.outputs.hasNextVersion == 'true'
        run: |
          podman build -t docker.io/${{ secrets.DOCKERHUB_USERNAME }}/learn-language-server:${{ steps.get_next_version.outputs.version }} server
          podman push docker.io/${{ secrets.DOCKERHUB_USERNAME }}/learn-language-server:${{ steps.get_next_version.outputs.version }}
      - name: Create release
        if: steps.get_next_version.outputs.hasNextVersion == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_next_version.outputs.tag }}
          generate_release_notes: true

  publish-client:
    concurrency:
      group: publish-client-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    needs: test-e2e
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Get next version
        id: get_next_version
        uses: mucsi96/get-next-version@main
        with:
          prefix: 'client'
          src: client
      - name: Login to Docker Hub
        if: steps.get_next_version.outputs.hasNextVersion == 'true'
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | podman login --username "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin docker.io
      - name: Build and push client image
        if: steps.get_next_version.outputs.hasNextVersion == 'true'
        run: |
          podman build -t docker.io/${{ secrets.DOCKERHUB_USERNAME }}/learn-language-client:${{ steps.get_next_version.outputs.version }} client
          podman push docker.io/${{ secrets.DOCKERHUB_USERNAME }}/learn-language-client:${{ steps.get_next_version.outputs.version }}
      - name: Create release
        if: steps.get_next_version.outputs.hasNextVersion == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_next_version.outputs.tag }}
          generate_release_notes: true
  deploy:
    concurrency:
      group: ${{ github.workflow }}-deploy
      cancel-in-progress: false
    runs-on: ubuntu-latest
    needs: [publish-server, publish-client]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - name: Connect to Twingate
        uses: twingate/github-action@v1
        with:
          service-key: ${{ secrets.TWINGATE_SERVICE_KEY }}

      - name: Deploy to Kubernetes
        env:
          K8S_CONFIG: ${{ secrets.K8S_CONFIG }}
          HOSTNAME: ${{ secrets.HOSTNAME }}
          API_CLIENT_ID: ${{ secrets.API_CLIENT_ID }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          AZURE_KEYVAULT_ENDPOINT: ${{ secrets.AZURE_KEYVAULT_ENDPOINT }}
        run: scripts/deploy.sh
